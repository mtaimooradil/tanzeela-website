backend:
  name: github
  repo: mtaimooradil/tanzeela-website
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth
  site_id: fa37cbc9-9a3e-4cd7-870e-6ffe734da6f9

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title",     name: "title",    widget: "string" }
      - { label: "Date",      name: "date",     widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Category",  name: "category", widget: "select", options: ["Mental Health", "CBT & Therapy", "Trauma & Recovery", "Anxiety & Stress", "General"] }
      - { label: "Excerpt",   name: "excerpt",  widget: "text" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "5 min read" }
      - { label: "Body",      name: "body",     widget: "markdown" }
